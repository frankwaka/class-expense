<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>班級選修費用查詢系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── Claude Brand Color Theme + V0 Layout ── */
:root {
  --bg: #FAF6F3;
  --bg-warm: #F3EEEA;
  --card: #FFFFFF;
  --card-hover: #FDF9F7;
  --accent: #D97757;
  --accent-light: #F8E4DC;
  --accent-dark: #C0654A;
  --accent-soft: #E8A88E;
  --text: #3D3530;
  --text-soft: #6E615A;
  --text-muted: #A89A92;
  --border: #E8DED6;
  --border-light: #F0E8E2;
  --paid: #6A9B6A;
  --paid-bg: #EDF5ED;
  --unpaid: #C4645A;
  --unpaid-bg: #FAEDEB;
  --highlight: #FFF8F4;
  --shadow-sm: 0 2px 6px rgba(217,119,87,.06);
  --shadow: 0 3px 12px rgba(217,119,87,.08);
  --shadow-md: 0 6px 20px rgba(217,119,87,.1);
  --shadow-lg: 0 10px 36px rgba(217,119,87,.12);
  --radius: 24px;
  --radius-sm: 18px;
  --radius-xs: 14px;
  --cherry: #D97757;
  --cherry-bg: #F8EDE8;
  --koelr: #7A9A5E;
  --koelr-bg: #EFF4EA;
  --cotton: #C08A56;
  --cotton-bg: #F7EEE3;
  --maple: #B05E52;
  --maple-bg: #F5E9E6;
  --transition: .25s cubic-bezier(.4,0,.2,1);
  --font-num: 'DM Sans', sans-serif;
}

/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Body ── */
body {
  font-family: 'Zen Maru Gothic', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.7;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #D97757 0%, #E0926E 100%);
  padding: 2rem 1.5rem 2.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-radius: 0 0 40px 40px;
  box-shadow: 0 8px 32px rgba(217,119,87,.25);
}
.header::before {
  display: none;
}
.header::after {
  content: '🌸 🌼 🌷';
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.2rem;
  letter-spacing: 8px;
  opacity: .5;
}
.header-inner {
  position: relative;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: 3px;
  color: rgba(255,255,255,.85);
  margin-bottom: 1rem;
  text-transform: uppercase;
  background: rgba(255,255,255,.2);
  padding: .4rem 1rem;
  border-radius: 20px;
}
.header h1 {
  font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 6px;
  color: #fff;
  margin-bottom: .6rem;
  text-shadow: 0 2px 8px rgba(0,0,0,.1);
}
.header p {
  font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
  font-size: 1.05rem;
  color: rgba(255,255,255,.9);
  font-weight: 500;
  letter-spacing: 2px;
}

/* ── Container ── */
.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

/* ── Search Section ── */
.search-section {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  margin-bottom: 1.5rem;
  margin-top: -1.5rem;
  border: 2px solid var(--border-light);
  position: relative;
}
.search-section::before {
  display: none;
}
.search-label {
  font-size: .8rem;
  font-weight: 600;
  color: var(--text-soft);
  margin-bottom: .8rem;
  letter-spacing: 2px;
  text-align: center;
}
.search-row {
  display: flex;
  gap: .8rem;
}
.search-wrapper {
  position: relative;
  flex: 1;
}
.search-wrapper input {
  width: 100%;
  padding: 1rem 1.2rem;
  border: 2px solid var(--border);
  border-radius: var(--radius-xs);
  font-size: 1.1rem;
  font-family: inherit;
  background: var(--bg-warm);
  color: var(--text);
  outline: none;
  transition: all var(--transition);
}
.search-wrapper input::placeholder {
  color: var(--text-muted);
  font-weight: 400;
}
.search-wrapper input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(217,119,87,.15);
  background: var(--card);
}
.search-wrapper input:disabled {
  opacity: .5;
  cursor: not-allowed;
}
.btn-search {
  padding: 1rem 1.8rem;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius-xs);
  font-size: .95rem;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  letter-spacing: 2px;
  box-shadow: 0 4px 12px rgba(217,119,87,.3);
}
.btn-search:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--accent-dark) 0%, #A85540 100%);
  box-shadow: 0 6px 20px rgba(217,119,87,.4);
  transform: translateY(-2px);
}
.btn-search:active:not(:disabled) { transform: scale(.97) translateY(0); }
.btn-search:disabled { opacity: .4; cursor: not-allowed; }

/* ── Autocomplete ── */
.autocomplete-list {
  position: absolute;
  top: calc(100% + 10px);
  left: 0;
  right: 0;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  max-height: 260px;
  overflow-y: auto;
  z-index: 100;
  display: none;
  box-shadow: var(--shadow-lg);
}
.autocomplete-list.show { display: block; animation: dropDown .2s ease; }
@keyframes dropDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.ac-item {
  padding: .85rem 1.2rem;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all var(--transition);
  border-bottom: 1px solid var(--border-light);
}
.ac-item:last-child { border-bottom: none; }
.ac-item:first-child { border-radius: 16px 16px 0 0; }
.ac-item:last-child { border-radius: 0 0 16px 16px; }
.ac-item:only-child { border-radius: 16px; }
.ac-item:hover { background: var(--accent-light); padding-left: 1.5rem; }
.ac-item .seat {
  color: var(--text-muted);
  font-size: .82rem;
  font-weight: 600;
  background: var(--bg-warm);
  padding: .25rem .6rem;
  border-radius: 10px;
}

/* ── Scrollbar ── */
.autocomplete-list::-webkit-scrollbar { width: 3px; }
.autocomplete-list::-webkit-scrollbar-track { background: transparent; }
.autocomplete-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Hint ── */
.hint {
  text-align: center;
  padding: 3rem 1.5rem;
  color: var(--text-soft);
  background: var(--card);
  border-radius: var(--radius);
  border: 2px dashed var(--border);
}
.hint-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: .8;
}
.hint p {
  font-size: 1rem;
  line-height: 2;
  color: var(--text-soft);
  font-weight: 500;
}

/* ── Student Card ── */
.student-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: slideUp .4s cubic-bezier(.4,0,.2,1);
  margin-bottom: 1.2rem;
  border: 2px solid var(--border-light);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.student-header {
  padding: 1.4rem 1.6rem;
  background: linear-gradient(135deg, #D97757 0%, #E8A88E 100%);
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
}
.student-header::before {
  display: none;
}
.student-header::after {
  content: '⭐';
  position: absolute;
  right: 15px;
  top: 10px;
  font-size: .9rem;
  opacity: .4;
}
.student-name {
  font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
  font-size: 1.7rem;
  font-weight: 700;
  letter-spacing: 4px;
  text-shadow: 0 2px 4px rgba(0,0,0,.1);
  position: relative;
}
.student-seat {
  font-size: .8rem;
  font-weight: 600;
  background: rgba(255,255,255,.25);
  padding: .35rem .9rem;
  border-radius: 20px;
  letter-spacing: 1px;
  backdrop-filter: blur(4px);
  position: relative;
}

/* ── Total Banner ── */
.total-banner {
  background: var(--accent-light);
  padding: 1.2rem 1.6rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid var(--border-light);
}
.total-banner .label {
  font-size: .9rem;
  color: var(--text-soft);
  font-weight: 500;
  letter-spacing: .5px;
}
.total-banner .amount {
  font-family: var(--font-num);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent-dark);
  letter-spacing: -.5px;
  text-shadow: 0 1px 2px rgba(0,0,0,.05);
}
.pay-btn-wrap {
  padding: 1rem 1.6rem;
  border-bottom: 2px solid var(--border-light);
  text-align: center;
  background: var(--bg-warm);
}
.pay-btn {
  display: inline-flex;
  align-items: center;
  gap: .6rem;
  padding: .9rem 2.2rem;
  background: linear-gradient(135deg, #6A9B6A 0%, #578B57 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius-xs);
  font-size: 1rem;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 2px;
  transition: all var(--transition);
  box-shadow: 0 4px 16px rgba(106,155,106,.35);
}
.pay-btn:hover {
  background: linear-gradient(135deg, #578B57 0%, #487B48 100%);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(106,155,106,.45);
}
.pay-btn:active { transform: translateY(0); }

.photo-link-wrap {
  padding: .2rem 1.6rem .3rem;
  text-align: center;
}
.photo-link-btn {
  display: inline-flex;
  align-items: center;
  gap: .6rem;
  padding: .7rem 2rem;
  background: linear-gradient(135deg, #5B8EC9 0%, #4A7DB8 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius-xs);
  font-size: .95rem;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 2px;
  transition: all var(--transition);
  box-shadow: 0 4px 16px rgba(91,142,201,.35);
}
.photo-link-btn:hover {
  background: linear-gradient(135deg, #4A7DB8 0%, #3D6DA7 100%);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(91,142,201,.45);
}
.photo-link-btn:active { transform: translateY(0); }

/* ── Grade Headers ── */
.grade-section {}
.grade-header {
  padding: .9rem 1.6rem;
  font-size: .85rem;
  font-weight: 700;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: .6rem;
  border-bottom: 2px solid var(--border-light);
}
.grade-header.cherry { background: var(--cherry-bg); color: var(--cherry); }
.grade-header.koelr  { background: var(--koelr-bg);  color: var(--koelr); }
.grade-header.cotton { background: var(--cotton-bg); color: var(--cotton); }
.grade-header.maple  { background: var(--maple-bg);  color: var(--maple); }
.grade-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
  box-shadow: 0 2px 6px currentColor;
  opacity: .8;
}
.grade-dot.cherry { background: var(--cherry); }
.grade-dot.koelr  { background: var(--koelr); }
.grade-dot.cotton { background: var(--cotton); }
.grade-dot.maple  { background: var(--maple); }
.grade-subtotal {
  margin-left: auto;
  font-family: var(--font-num);
  font-size: .95rem;
  font-weight: 700;
}

/* ── Season Groups ── */
.season-group {
  border-bottom: 1px solid var(--border-light);
}
.season-group:last-child { border-bottom: none; }
.season-header {
  padding: 1rem 1.6rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}
.season-header:hover { background: var(--card-hover); padding-left: 1.8rem; }
.season-title {
  font-weight: 600;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  gap: .55rem;
  color: var(--text);
}
.season-icon { font-size: 1.2rem; }
.season-right {
  display: flex;
  align-items: center;
  gap: .6rem;
}
.season-total {
  font-family: var(--font-num);
  font-weight: 700;
  font-size: 1rem;
  color: var(--accent-dark);
}
.season-paid {
  display: inline-flex;
  align-items: center;
  font-size: .72rem;
  font-weight: 700;
  padding: .3rem .7rem;
  border-radius: 20px;
  letter-spacing: .5px;
}
.paid-yes {
  background: var(--paid-bg);
  color: var(--paid);
  box-shadow: 0 2px 8px rgba(106,155,106,.2);
}
.paid-no {
  background: var(--unpaid-bg);
  color: var(--unpaid);
  box-shadow: 0 2px 8px rgba(196,100,90,.2);
}
.chevron {
  font-size: .55rem;
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  color: var(--text-muted);
  margin-left: .2rem;
}
.chevron.open { transform: rotate(180deg); }

/* ── Season Details ── */
.season-details {
  padding: .5rem 1.6rem 1rem;
  display: none;
  padding-left: 3rem;
  background: var(--bg-warm);
  margin: 0 .5rem .5rem;
  border-radius: var(--radius-xs);
}
.season-details.open { display: block; animation: expandIn .25s ease; }
@keyframes expandIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.course-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .65rem 0;
  border-bottom: 1px dashed var(--border);
  font-size: 1.05rem;
}
.course-row:last-child { border-bottom: none; }
.course-name {
  color: var(--text-soft);
  font-weight: 500;
}
.course-amount {
  font-family: var(--font-num);
  font-weight: 700;
  min-width: 60px;
  text-align: right;
  color: var(--accent-dark);
}
.no-course {
  color: var(--text-muted);
  font-size: .95rem;
  padding: .5rem 0;
  font-weight: 400;
  font-style: italic;
}

/* ── Error ── */
.error-msg {
  text-align: center;
  padding: 3rem 1.5rem;
  color: var(--unpaid);
  animation: slideUp .35s cubic-bezier(.4,0,.2,1);
  background: var(--card);
  border-radius: var(--radius);
  border: 2px solid var(--unpaid-bg);
}
.error-msg .icon { font-size: 3rem; margin-bottom: 1rem; }
.error-msg p { font-size: 1rem; font-weight: 500; }

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 2.5rem 1rem 1.5rem;
  color: var(--text-muted);
  font-size: .8rem;
  letter-spacing: 2px;
  font-weight: 500;
}

/* ── Loading ── */
.loading {
  text-align: center;
  padding: 4rem 1.5rem;
  color: var(--text-soft);
  background: var(--card);
  border-radius: var(--radius);
  border: 2px dashed var(--border);
}
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 1.2rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 1rem; color: var(--text-soft); font-weight: 500; }

/* ── Status Bar ── */
.status-bar {
  background: var(--card);
  border-radius: var(--radius-xs);
  padding: .8rem 1.2rem;
  margin-bottom: 1.2rem;
  font-size: .85rem;
  color: var(--text-soft);
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--shadow);
  border: 2px solid var(--border-light);
  font-weight: 500;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: .5rem;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
.status-dot.ok  { background: var(--paid); box-shadow: 0 0 8px var(--paid); }
.status-dot.err { background: var(--unpaid); box-shadow: 0 0 8px var(--unpaid); }

/* ── Mobile First - Larger, easier to read text ── */
@media (max-width: 480px) {
  .header { padding: 1.8rem 1.2rem 2.2rem; border-radius: 0 0 30px 30px; }
  .header h1 { font-size: 2rem; letter-spacing: 3px; }
  .header p { font-size: 1.15rem; }
  .header::after { font-size: 1rem; bottom: 10px; }
  .container { padding: 1.2rem .85rem 2.5rem; }
  .search-section { padding: 1.3rem; margin-top: -1rem; }
  .search-section::before { font-size: 1.5rem; top: -18px; }
  .search-label { font-size: .9rem; }
  .search-row { flex-direction: column; gap: .7rem; }
  .search-wrapper { width: 100%; }
  .search-wrapper input { font-size: 1.2rem; padding: 1.1rem 1.2rem; }
  .btn-search { width: 100%; padding: 1.1rem; font-size: 1.1rem; }
  .student-name { font-size: 1.9rem; letter-spacing: 3px; }
  .student-seat { font-size: .9rem; padding: .4rem 1rem; }
  .total-banner .label { font-size: 1rem; }
  .total-banner .amount { font-size: 2rem; }
  .pay-btn { font-size: 1.1rem; padding: 1rem 2.2rem; }
  .grade-header { padding: 1rem 1.3rem; font-size: .95rem; }
  .grade-subtotal { font-size: 1.05rem; }
  .grade-dot { width: 12px; height: 12px; }
  .season-header { padding: 1rem 1.3rem; }
  .season-header:hover { padding-left: 1.5rem; }
  .season-title { font-size: 1.15rem; }
  .season-icon { font-size: 1.3rem; }
  .season-total { font-size: 1.1rem; }
  .season-paid { font-size: .82rem; padding: .35rem .8rem; }
  .season-details { padding: .7rem 1rem 1rem 2.5rem; margin: 0 .3rem .5rem; }
  .course-row { font-size: 1.1rem; padding: .75rem 0; }
  .course-amount { font-size: 1.1rem; }
  .no-course { font-size: 1rem; }
  .student-header { padding: 1.2rem 1.3rem; }
  .student-header::after { font-size: .8rem; }
  .total-banner { padding: 1rem 1.3rem; }
  .hint { padding: 2.5rem 1.2rem; }
  .hint-icon { font-size: 3.5rem; }
  .hint p { font-size: 1.1rem; line-height: 2.2; }
  .status-bar { font-size: .9rem; padding: .9rem 1rem; }
  .status-dot { width: 10px; height: 10px; }
  .ac-item { font-size: 1.1rem; padding: .9rem 1.2rem; }
  .ac-item .seat { font-size: .9rem; }
  .error-msg { padding: 2.5rem 1.2rem; }
  .error-msg .icon { font-size: 3.5rem; }
  .error-msg p { font-size: 1.1rem; }
  .loading { padding: 3.5rem 1.2rem; }
  .loading-spinner { width: 45px; height: 45px; }
  .loading p { font-size: 1.1rem; }
  /* Modal mobile styles - larger fonts */
  .modal-header h2 { font-size: 1.3rem; }
  .modal-body { padding: 1.3rem; }
  .pay-info-card { padding: 1.1rem; }
  .pay-info-card .card-title { font-size: 1.15rem; }
  .pay-info-row { font-size: 1.15rem; }
  .pay-info-row .lbl { font-size: 1.05rem; }
  .pay-info-row .val { font-size: 1.15rem; }
  .pay-info-row .val.mono { font-size: 1.1rem; }
  .pay-deadline { font-size: 1.2rem; padding: 1.1rem; }
  .btn-primary { font-size: 1.15rem; padding: 1.15rem; }
  .btn-outline { font-size: 1.05rem; padding: 1rem; }
  .form-label { font-size: 1rem; }
  .form-input, .form-select { font-size: 1.15rem; padding: 1rem 1.1rem; }
  .form-hint { font-size: .9rem; }
  .linepay-note { font-size: 1rem; padding: .9rem 1.1rem; }

<div class="photo-link-wrap"><a class="photo-link-btn" href="https://drive.google.com/drive/folders/19_EBXvx2q-m5DRLUseTyTJmzGY_ahLJH" target="_blank" rel="noopener">📷 收據照片</a></div>
<div class="footer">班級選修費用查詢系統　　和平實驗小學</div>

<script>
// ============================================================
// ★★★ 設定區 ★★★
// ============================================================
const SHEET_ID = '1Gqea_tTq_-Mvd8LfLbDKu9T5zB_vWB5pbQiYDgMidGE';
const SHEET_NAME = '選修費';

// ★ 繳費回報 Apps Script 網址（部署後貼在這裡）
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHCpaW-tnb9V8yW8HEH_SWjvazFhMUIP7L6Au-VaBQ8zEtYRnpe7ZDkwAmFjrxV0YuqA/exec';

// ★ 繳費資訊（每學季更新這裡就好）
const PAY_INFO = {
  bank: '台北富邦 012',
  branch: '莊敬分行',
  account: '00461168191348',
  accountName: '戴依依',
  linePayUrl: 'https://line.me/ti/p/7BYZ9G-oeF',
  linePay: '請先加「戴依依」為好友，並告知是幾號的家長',
  deadline: '12/5',
};

// 已全部繳清的學季（格式：「年級名-學季名」）
// 這些學季所有學生都會顯示「已繳」，不需要在試算表標記
const PAID_SEASONS = [
  "山櫻班-秋學季",
  "山櫻班-冬學季",
  "山櫻班-春學季",
  "山櫻班-夏學季",
  "欒樹班-秋學季",
  // ↓ 從欒樹冬開始，改用試算表 AC 欄的「已繳款」v 標記來判斷
  // 以後每學季都一樣：在最後一個科目欄的右邊加「已繳款」欄，填 v 就會顯示已繳
];

// 年級設定：用欄位前綴來區分哪些欄屬於哪個年級
// prefix: 試算表欄位開頭是這些字的，就歸到這個年級
const GRADE_CONFIG = [
  { name:"山櫻班", grade:"三年級", colorClass:"cherry",
    prefixes:["山秋","山冬","山春","山夏","山櫻"] },
  { name:"欒樹班", grade:"四年級", colorClass:"koelr",
    prefixes:["欒秋","欒冬","欒樹","欒春","欒夏"] },
  // 未來新增（把註解拿掉就好）：
  // { name:"木棉班", grade:"五年級", colorClass:"cotton",
  //   prefixes:["木秋","木冬","木春","木夏","木棉"] },
  // { name:"楓香班", grade:"六年級", colorClass:"maple",
  //   prefixes:["楓秋","楓冬","楓春","楓夏","楓香"] },
];
// ============================================================

const SEASON_MAP = {"秋":"🍂","冬":"❄️","春":"🌸","夏":"☀️"};
function getSeasonIcon(name) {
  for (const [k,v] of Object.entries(SEASON_MAP)) { if (name.includes(k)) return v; }
  return "📘";
}

// 判斷一個欄位屬於哪個年級
function matchGrade(colName) {
  // 依 prefix 長度由長到短比對，避免「秋」誤配「欒秋」
  for (const g of [...GRADE_CONFIG].sort((a,b) => {
    const maxA = Math.max(...a.prefixes.map(p=>p.length));
    const maxB = Math.max(...b.prefixes.map(p=>p.length));
    return maxB - maxA;
  })) {
    for (const p of g.prefixes.sort((a,b)=>b.length-a.length)) {
      if (colName.startsWith(p)) return g;
    }
  }
  return null;
}

// 從欄位名判斷季節名
function getSeasonName(colName, gradeConfig) {
  // "欒秋-手作" → 找到 prefix "欒秋" → 季節是 "秋學季"
  // "秋" → 季節是 "秋學季"
  // "春-神農氏" → 季節是 "春學季"
  for (const p of gradeConfig.prefixes.sort((a,b)=>b.length-a.length)) {
    if (colName.startsWith(p)) {
      // 取出季節字：最後一個字
      const lastChar = p.slice(-1);
      for (const s of Object.keys(SEASON_MAP)) {
        if (lastChar === s || p.includes(s)) return s + "學季";
      }
      return p + "學季";
    }
  }
  return "其他";
}

// 取得課程顯示名稱
function getCourseName(colName) {
  const dash = colName.indexOf('-');
  if (dash >= 0) return colName.substring(dash + 1);
  return colName + "選修";
}

let allStudents = [];
let dataReady = false;

// 從「繳費回報」頁籤 G1 讀取繳費截止日
async function fetchDeadline() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('繳費回報')}&range=A1`;
    const res = await fetch(url);
    const text = await res.text();
    const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (jsonStr) {
      const json = JSON.parse(jsonStr[1]);
      const cell = json.table?.rows?.[0]?.c?.[0];
      if (cell) {
        // 優先使用格式化後的值（f），如果沒有就解析原始值（v）
        if (cell.f) {
          PAY_INFO.deadline = String(cell.f).trim();
        } else {
          const val = String(cell.v).trim();
          // 處理 Google 回傳的 Date(year,month,day) 格式
          const dateMatch = val.match(/Date\((\d+),(\d+),(\d+)\)/);
          if (dateMatch) {
            const month = parseInt(dateMatch[2]) + 1; // Google 月份從 0 開始
            const day = parseInt(dateMatch[3]);
            PAY_INFO.deadline = `${month}/${day}`;
          } else {
            PAY_INFO.deadline = val;
          }
        }
      }
    }
  } catch (e) {
    // 讀不到就用預設值，不影響其他功能
  }
}

async function fetchSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const res = await fetch(url);
  const text = await res.text();
  const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
  if (!jsonStr) throw new Error('無法解析試算表資料，請確認分享設定');
  return JSON.parse(jsonStr[1]);
}

function parseData(json) {
  const cols = json.table.cols.map(c => (c.label || '').trim());
  const rows = json.table.rows;

  const seatIdx = cols.findIndex(c => c.includes('座號'));
  const nameIdx = cols.findIndex(c => c.includes('姓名'));
  if (seatIdx === -1 || nameIdx === -1) throw new Error('找不到「座號」或「姓名」欄位');

  // 分析每個欄位歸屬
  // colInfo[i] = { grade, seasonName, courseName, isPaid, colIdx }
  const colInfos = [];
  let lastDataCol = null; // 追蹤「已繳款」對應的前一個資料欄

  for (let i = 0; i < cols.length; i++) {
    const col = cols[i];
    if (i === seatIdx || i === nameIdx || !col) continue;

    if (col === '已繳款') {
      // 標記前一個學季的 paid 欄位
      if (lastDataCol) lastDataCol.paidIdx = i;
      continue;
    }
    if (col.includes('總額') || col.includes('選修費')) {
      continue; // 跳過小計欄
    }

    const grade = matchGrade(col);
    if (!grade) continue;

    const seasonName = getSeasonName(col, grade);
    const courseName = getCourseName(col);

    const info = { grade: grade, seasonName, courseName, colIdx: i, paidIdx: -1 };
    colInfos.push(info);
    lastDataCol = info;
  }

  // 組織成 grade → season → courses 結構
  const students = [];

  for (const row of rows) {
    const cells = row.c || [];
    const seatVal = cells[seatIdx]?.v;
    const nameVal = cells[nameIdx]?.v;
    if (!seatVal || !nameVal) continue;
    if (typeof seatVal === 'string' && seatVal.includes('入班費')) continue;
    const seat = Math.round(Number(seatVal));
    if (isNaN(seat)) continue;

    // 建立每個年級的資料
    const grades = [];
    for (const gc of GRADE_CONFIG) {
      const myCols = colInfos.filter(c => c.grade === gc);
      if (myCols.length === 0) continue;

      // 分組成學季
      const seasonMap = {};
      for (const ci of myCols) {
        if (!seasonMap[ci.seasonName]) {
          seasonMap[ci.seasonName] = { name: ci.seasonName, icon: getSeasonIcon(ci.seasonName), courses: [], paidIdx: -1 };
        }
        const amount = Number(cells[ci.colIdx]?.v) || 0;
        seasonMap[ci.seasonName].courses.push({ label: ci.courseName, amount });
        if (ci.paidIdx >= 0) seasonMap[ci.seasonName].paidIdx = ci.paidIdx;
      }

      const seasons = Object.values(seasonMap).map(sn => {
        const total = sn.courses.reduce((a, c) => a + c.amount, 0);
        const mark = String(cells[sn.paidIdx]?.v ?? '').trim().toLowerCase().replace(/ｖ/g, 'v');
   const paid = sn.paidIdx >= 0 ? (['v', '✓', '✔', 'o', '是'].includes(mark) ? 'v' : '') : null;
        return { ...sn, total, paid };
      });

      grades.push({ name: gc.name, grade: gc.grade, colorClass: gc.colorClass, seasons });
    }

    students.push({ seat, name: nameVal, grades });
  }

  return students;
}

async function loadAllData() {
  const resultsDiv = document.getElementById('results');
  try {
    const json = await fetchSheet();
    allStudents = parseData(json);
    dataReady = true;
    await fetchDeadline(); // 從試算表讀取截止日

    document.getElementById('searchInput').disabled = false;
    document.getElementById('searchBtn').disabled = false;

    const now = new Date();
    const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

    resultsDiv.innerHTML = `
      <div class="status-bar"><span><span class="status-dot ok"></span>資料已載入（${allStudents.length} 位學生）</span><span>更新：${timeStr}</span></div>
      <div class="hint"><div class="hint-icon">🔍</div><p>輸入小朋友的姓名或座號<br>即可查看各學季的選修費用明細</p></div>`;
  } catch (err) {
    resultsDiv.innerHTML = `
      <div class="error-msg"><div class="icon">⚠️</div>
        <p>載入資料失敗</p>
        <p style="margin-top:.8rem;font-size:.82rem;line-height:1.6">請確認：<br>1. 試算表已設定「知道連結的人可以檢視」<br>2. 頁籤名稱為「${SHEET_NAME}」</p>
        <p style="margin-top:.8rem;font-size:.75rem;color:#bbb">${err.message}</p>
      </div>`;
  }
}

// === 搜尋 ===
const searchInput = document.getElementById('searchInput');
const acList = document.getElementById('autocomplete');
const resultsDiv = document.getElementById('results');

// 處理中文輸入法（注音/拼音）的組字狀態
let isComposing = false;
searchInput.addEventListener('compositionstart', () => { isComposing = true; });
searchInput.addEventListener('compositionend', () => {
  isComposing = false;
  triggerSearch(); // 組字完成後立即搜尋
});

function triggerSearch() {
  if (!dataReady) return;
  const q = searchInput.value.trim();
  if (!q) { acList.classList.remove('show'); return; }
  const m = allStudents.filter(x => x.name.includes(q) || String(x.seat) === q || String(x.seat).startsWith(q)).slice(0, 8);
  if (!m.length) { acList.classList.remove('show'); return; }
  acList.innerHTML = m.map(x => `<div class="ac-item" data-seat="${x.seat}" data-name="${x.name}"><span>${x.name}</span><span class="seat">座號 ${x.seat}</span></div>`).join('');
  acList.classList.add('show');
}

searchInput.addEventListener('input', () => {
  if (isComposing) return; // 組字中先不搜尋
  triggerSearch();
});

acList.addEventListener('click', e => {
  const item = e.target.closest('.ac-item');
  if (!item) return;
  searchInput.value = item.dataset.name;
  acList.classList.remove('show');
  const x = allStudents.find(s => s.seat === Number(item.dataset.seat) && s.name === item.dataset.name);
  if (x) render(x);
});

// 手機觸控支援
acList.addEventListener('touchend', e => {
  const item = e.target.closest('.ac-item');
  if (!item) return;
  e.preventDefault();
  searchInput.value = item.dataset.name;
  acList.classList.remove('show');
  const x = allStudents.find(s => s.seat === Number(item.dataset.seat) && s.name === item.dataset.name);
  if (x) render(x);
});

searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.addEventListener('click', e => { if (!e.target.closest('.search-wrapper')) acList.classList.remove('show'); });

function doSearch() {
  if (!dataReady) return;
  acList.classList.remove('show');
  const q = searchInput.value.trim();
  if (!q) return;
  const x = allStudents.find(s => s.name === q || String(s.seat) === q) || allStudents.find(s => s.name.includes(q));
  if (x) render(x);
  else resultsDiv.innerHTML = `<div class="error-msg"><div class="icon">😕</div><p>找不到「${q}」，請確認姓名或座號</p></div>`;
}

function render(x) {
  let gt = 0;
  let latestSeason = null; // 最新學季
  const html = x.grades.map(g => {
    let gTotal = 0;
    const shtml = g.seasons.map(sn => {
      const active = sn.courses.filter(c => c.amount > 0);
      gTotal += sn.total; gt += sn.total;
      const seasonKey = g.name + '-' + sn.name;
      const forcePaid = PAID_SEASONS.includes(seasonKey);
      const isPaid = forcePaid || sn.paid === 'v';
      // 記錄最新的學季（不論金額是否為 0，都要更新）
      latestSeason = { gradeName: g.name, seasonName: sn.name, total: sn.total };
      const showPaidTag = sn.total > 0 ? (isPaid ? '<span class="season-paid paid-yes">✓ 已繳</span>' : '<span class="season-paid paid-no">未繳</span>') : '';
      return `<div class="season-group"><div class="season-header" onclick="tog(this)"><div class="season-title"><span class="season-icon">${sn.icon}</span>${sn.name}${showPaidTag}</div><div class="season-right"><span class="season-total">${sn.total > 0 ? '$' + sn.total.toLocaleString() : '-'}</span><span class="chevron">▼</span></div></div><div class="season-details">${active.length > 0 ? active.map(c => `<div class="course-row"><span class="course-name">${c.label}</span><span class="course-amount">$${c.amount.toLocaleString()}</span></div>`).join('') : '<div class="no-course">本學季無選修費用</div>'}</div></div>`;
    }).join('');
    return `<div class="grade-section"><div class="grade-header ${g.colorClass}"><span class="grade-dot ${g.colorClass}"></span>${g.name}（${g.grade}）<span class="grade-subtotal">${gTotal > 0 ? '小計 $' + gTotal.toLocaleString() : ''}</span></div>${shtml}</div>`;
  }).join('');
  // 顯示最新學季金額：金額為 0 時顯示「本學季無需繳費」，不顯示繳費按鈕
  let bannerHtml = '';
  let payBtnHtml = '';
  if (latestSeason) {
    if (latestSeason.total > 0) {
      bannerHtml = `<div class="total-banner"><span class="label">${latestSeason.gradeName} ${latestSeason.seasonName} 應繳金額</span><span class="amount">$${latestSeason.total.toLocaleString()}</span></div>`;
      payBtnHtml = `<div class="pay-btn-wrap"><button class="pay-btn" onclick="openPayModal('${x.name}', ${x.seat}, ${latestSeason.total})">💳 繳費方式</button></div>`;
    } else {
      bannerHtml = `<div class="total-banner"><span class="label">${latestSeason.gradeName} ${latestSeason.seasonName}</span><span class="amount" style="color:var(--paid)">本學季無需繳費</span></div>`;
    }
  }
  resultsDiv.innerHTML = `<div class="student-card"><div class="student-header"><span class="student-name">${x.name}</span><span class="student-seat">座號 ${x.seat}</span></div>${bannerHtml}${payBtnHtml}${html}</div>`;
}

function tog(el) { el.nextElementSibling.classList.toggle('open'); el.querySelector('.chevron').classList.toggle('open'); }

loadAllData();

// ============================================================
// ★★★ 繳費回報彈窗 ★★★
// ============================================================

let currentStudent = { name: '', seat: 0, amount: 0 };

function openPayModal(name, seat, amount) {
  currentStudent = { name, seat, amount };
  // 建立 modal HTML
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'payModal';
  overlay.onclick = function(e) { if (e.target === overlay) closePayModal(); };

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h2>💳 選擇繳費方式</h2>
        <button class="modal-close" onclick="closePayModal()">✕</button>
      </div>
      <div class="modal-body">

        <!-- 步驟一：顯示繳費資訊 -->
        <div class="modal-step active" id="stepInfo">
          <div class="step-indicator">
            <span class="step-dot active">1</span>
            <span class="step-line"></span>
            <span class="step-dot inactive">2</span>
          </div>
          <div class="reminder-banner">
            ⚠️ 轉帳完成後，請務必回來<br>點下方「已繳費」按鈕回報！
          </div>
          <div class="pay-methods-row">
            <div class="pay-info-card">
              <div class="card-title">🏦 銀行轉帳</div>
              <div class="pay-info-row"><span class="lbl">銀行</span><span class="val">${PAY_INFO.bank}</span></div>
              <div class="pay-info-row"><span class="lbl">分行</span><span class="val">${PAY_INFO.branch}</span></div>
              <div class="pay-info-row"><span class="lbl">帳號</span><span class="val mono">${PAY_INFO.account}</span></div>
              <div class="pay-info-row"><span class="lbl">戶名</span><span class="val">${PAY_INFO.accountName}</span></div>
            </div>
            <div class="pay-info-card clickable" onclick="window.open('${PAY_INFO.linePayUrl}','_blank')">
              <div class="card-title">💚 LINE PAY</div>
              <div style="font-size:1.05rem;color:var(--text-soft);line-height:1.8">
                👉 點此加好友<br>
                戶名：${PAY_INFO.accountName}<br>
                加好友後請告知<br>是幾號的家長
              </div>
            </div>
          </div>
          <div class="pay-deadline">⏰ 繳費截止日：${PAY_INFO.deadline}</div>
          <button class="btn-primary pulse" onclick="goToStep('stepForm')">✅ 已繳費，下一步填寫回報 →</button>
          <button class="btn-outline" onclick="closePayModal()">還沒繳費，稍後再來</button>
        </div>

        <!-- 步驟二：繳費回報表單 -->
        <div class="modal-step" id="stepForm">
          <div class="step-indicator">
            <span class="step-dot inactive">✓</span>
            <span class="step-line"></span>
            <span class="step-dot active">2</span>
          </div>
          <div class="form-group">
            <label class="form-label">學生姓名</label>
            <input class="form-input readonly-info" type="text" value="${name}（座號 ${seat}）" readonly>
          </div>
          <div class="form-group">
            <label class="form-label">付款方式</label>
            <select class="form-select" id="payMethod" onchange="onMethodChange()">
              <option value="">請選擇...</option>
              <option value="富邦轉帳">富邦銀行轉帳</option>
              <option value="LinePay">LINE Pay</option>
            </select>
          </div>
          <div class="form-group" id="lastFiveGroup" style="display:none">
            <label class="form-label">匯款帳號後五碼</label>
            <input class="form-input" type="text" id="lastFive" placeholder="請輸入後五碼" maxlength="5" inputmode="numeric">
            <div class="form-hint">方便老師核對款項</div>
          </div>
          <div id="linePayNote" style="display:none">
            <div class="linepay-note">
              📱 使用 LINE Pay 繳費請注意：<br>
              1. <a href="${PAY_INFO.linePayUrl}" target="_blank" style="color:var(--koelr);font-weight:600">點此加「${PAY_INFO.accountName}」為好友</a><br>
              2. 轉帳時請在訊息備註「<strong>${seat}號 ${name}</strong>」
            </div>
          </div>
          <button class="btn-primary" id="submitBtn" onclick="submitReport()" disabled>送出繳費回報</button>
          <button class="btn-outline" onclick="goToStep('stepInfo')">← 返回</button>
        </div>

        <!-- 步驟三：成功畫面 -->
        <div class="modal-step" id="stepSuccess">
          <div class="success-screen">
            <div class="success-icon">🎉</div>
            <h3>繳費回報已送出！</h3>
            <p>會計會儘快確認您的繳費紀錄<br>感謝您的配合 ✨</p>
          </div>
          <button class="btn-primary" onclick="closePayModal()" style="margin-top:1rem">關閉</button>
        </div>

      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';
}

function closePayModal() {
  const modal = document.getElementById('payModal');
  if (modal) {
    modal.remove();
    document.body.style.overflow = '';
  }
}

function goToStep(stepId) {
  document.querySelectorAll('#payModal .modal-step').forEach(s => s.classList.remove('active'));
  document.getElementById(stepId).classList.add('active');
}

function onMethodChange() {
  const method = document.getElementById('payMethod').value;
  const lastFiveGroup = document.getElementById('lastFiveGroup');
  const linePayNote = document.getElementById('linePayNote');
  const submitBtn = document.getElementById('submitBtn');

  if (method === '富邦轉帳') {
    lastFiveGroup.style.display = 'block';
    linePayNote.style.display = 'none';
    submitBtn.disabled = false;
  } else if (method === 'LinePay') {
    lastFiveGroup.style.display = 'none';
    linePayNote.style.display = 'block';
    submitBtn.disabled = false;
  } else {
    lastFiveGroup.style.display = 'none';
    linePayNote.style.display = 'none';
    submitBtn.disabled = true;
  }
}

async function submitReport() {
  const btn = document.getElementById('submitBtn');
  const method = document.getElementById('payMethod').value;
  const lastFive = method === '富邦轉帳' ? (document.getElementById('lastFive').value.trim()) : '（LINE Pay）';

  if (!method) return;

  // 富邦轉帳需要後五碼
  if (method === '富邦轉帳' && !lastFive) {
    alert('請填寫匯款帳號後五碼');
    return;
  }
  if (method === '富邦轉帳' && !/^\d{5}$/.test(lastFive)) {
    alert('後五碼請填 5 位數字');
    return;
  }

  // 防重複送出
  btn.disabled = true;
  btn.textContent = '送出中...';

  try {
    // 用 GET + URL 參數送出，避免 CORS 問題
    const params = new URLSearchParams({
      seat: currentStudent.seat,
      name: currentStudent.name,
      method: method,
      lastFive: lastFive,
      amount: currentStudent.amount,
    });
    const url = SCRIPT_URL + '?' + params.toString();

    // 用 Image 發送 GET 請求，不受 CORS 限制
    await new Promise((resolve) => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve; // 即使回傳非圖片也算送出成功
      img.src = url;
      setTimeout(resolve, 3000); // 最多等 3 秒
    });

    goToStep('stepSuccess');

  } catch (err) {
    alert('送出失敗，請稍後再試。\n錯誤：' + err.message);
    btn.disabled = false;
    btn.textContent = '送出繳費回報';
  }
}
</script>
